rules:
  # --- SECURITY ---
  - id: pynt-manual-secrets
    patterns:
      - pattern-either:
          - pattern: $X = "..."
      - metavariable-regex:
          metavariable: "$X"
          regex: "(?i)(API_KEY|PASSWORD|AUTH_TOKEN)"
    message: "Possibile segreto hardcoded rilevato in $X."
    severity: ERROR
    languages: [python]

  - id: pynt-any-eval
    pattern: eval(...)
    message: "L'uso di eval() è proibito indipendentemente dal contenuto."
    severity: ERROR
    languages: [python]
    
  # --- SQL INJECTION FIXATA ---
  - id: pynt-sql-injection-hardcore
    patterns:
      - pattern-either:
          # Caso 1: Assegnazione esplicita f-string (Il tuo caso in database.py)
          - pattern: |
              $QUERY = f"..."
              ...
              $DB.execute($QUERY)
          
          # Caso 2: Assegnazione esplicita concatenazione
          - pattern: |
              $QUERY = "..." + ...
              ...
              $DB.execute($QUERY)
          
          # Caso 3: Inline
          - pattern: $DB.execute(f"...")
          - pattern: $DB.execute("..." + ...)

    message: "SQL Injection Critica: Query SQL costruita dinamicamente rilevata."
    languages: [python]
    severity: ERROR

  - id: pynt-any-eval
    pattern: eval(...)
    message: "L'uso di eval() è proibito."
    severity: ERROR
    languages: [python]
  - id: pynt-string-int-comparison
    patterns:
      - pattern-either:
          - pattern: '"..." == $VAR'
          - pattern: '$VAR == "..."'
          - pattern: '"..." != $VAR'
          - pattern: '$VAR != "..."'
    message: "Confronto tra stringa e intero. Sarà sempre False."
    severity: ERROR
    languages: [python]

  - id: pynt-insecure-subprocess-shell
    patterns:
      - pattern: subprocess.run(..., shell=True)
    message: "Uso di subprocess con shell=True è pericoloso, evita l'iniezione di comandi."
    severity: WARNING
    languages: [python]

  - id: pynt-insecure-pickle-load
    pattern: pickle.load(...)
    message: "pickle.load su dati non attendibili può portare a esecuzione di codice remoto. Usa alternatives sicuri."
    severity: ERROR
    languages: [python]

  - id: pynt-requests-no-verify
    patterns:
      - pattern: requests.get(..., verify=False)
      - pattern: requests.post(..., verify=False)
    message: "Disabilitare la verifica del certificato SSL rende la connessione insicura."
    severity: WARNING
    languages: [python]

  - id: pynt-insecure-yaml-load
    pattern: yaml.load(...)
    message: "yaml.load può eseguire codice arbitrario. Usa yaml.safe_load."
    severity: WARNING
    languages: [python]

  - id: pynt-hardcoded-crypto-key
    patterns:
      - pattern: $VAR = "-----BEGIN PRIVATE KEY-----*"
      - pattern: $VAR = "-----BEGIN PUBLIC KEY-----*"
    message: "Chiave crittografica hardcodata trovata, considerare gestione più sicura."
    severity: ERROR
    languages: [python]

  - id: pynt-bare-except
    pattern: "except:\n    ..."
    message: "Gestire eccezioni specifiche invece di un bare except."
    severity: INFO
    languages: [python]
