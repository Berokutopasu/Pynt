rules:
  # --- SECURITY ---
  - id: pynt-manual-secrets
    patterns:
      - pattern-either:
          - pattern: $X = "..."
      - metavariable-regex:
          metavariable: "$X"
          regex: "(?i)(API_KEY|PASSWORD|AUTH_TOKEN)"
    message: "Possibile segreto hardcoded rilevato in $X."
    severity: ERROR
    languages: [python]

  - id: pynt-any-eval
    pattern: eval(...)
    message: "L'uso di eval() è proibito indipendentemente dal contenuto."
    severity: ERROR
    languages: [python]

  # --- BEST PRACTICES ---
  - id: pynt-mutable-defaults
    pattern: "def $F(..., $ARG=[], ...): ..."
    message: "Mutable default argument rilevato. Usa '$ARG=None'."
    severity: WARNING
    languages: [python]

  - id: pynt-redundant-true
    pattern: "if $X == True:"
    message: "Confronto ridondante. Usa 'if $X:'."
    severity: INFO
    languages: [python]
    
  - id: pynt-always-true-comparison
    pattern: "True == True"
    message: "Confronto 'True == True' è inutile."
    severity: WARNING
    languages: [python]

  # --- FAULT DETECTION ---
  - id: pynt-string-int-comparison
    pattern: '"..." == $INT'
    message: "Confronto tra stringa e intero. Sarà sempre False."
    severity: ERROR
    languages: [python]

  - id: pynt-useless-assignment
    patterns:
      - pattern: |
          $X = $V1
          $X = $V2
    message: "La variabile $X viene sovrascritta immediatamente senza essere usata."
    severity: INFO
    languages: [python]
  - id: pynt-sql-injection-hardcore
    patterns:
      - pattern-either:
          - pattern: $CURSOR.execute(f"...")
          - pattern: $CURSOR.execute("..." + ...)
          - pattern: |
              $QUERY = f"..."
              ...
              $CURSOR.execute($QUERY)
          - pattern: |
              $QUERY = "..." + ...
              ...
              $CURSOR.execute($QUERY)
      - metavariable-regex:
          metavariable: $QUERY
          regex: (?i).*(select|insert|update|delete|create|drop).*
    message: "SQL Injection Critica: Rilevata costruzione query insicura."
    languages: [python]
    severity: ERROR
    # --- REGOLA DEBUG (Per capire se Semgrep legge il file) ---
  - id: pynt-debug-execute-check
    pattern: $ANYTHING.execute(...)
    message: "[DEBUG] Trovata una chiamata .execute(). Semgrep sta leggendo il file!"
    severity: INFO
    languages: [python]

  # --- SQL INJECTION FIXATA ---
  - id: pynt-sql-injection-hardcore
    patterns:
      - pattern-either:
          # Caso 1: Assegnazione esplicita f-string (Il tuo caso in database.py)
          - pattern: |
              $QUERY = f"..."
              ...
              $DB.execute($QUERY)
          
          # Caso 2: Assegnazione esplicita concatenazione
          - pattern: |
              $QUERY = "..." + ...
              ...
              $DB.execute($QUERY)
          
          # Caso 3: Inline
          - pattern: $DB.execute(f"...")
          - pattern: $DB.execute("..." + ...)

    message: "SQL Injection Critica: Query SQL costruita dinamicamente rilevata."
    languages: [python]
    severity: ERROR

  # --- ALTRE REGOLE ---
  - id: pynt-manual-secrets
    patterns:
      - pattern-either:
          - pattern: $X = "..."
      - metavariable-regex:
          metavariable: "$X"
          regex: "(?i)(API_KEY|PASSWORD|AUTH_TOKEN)"
    message: "Possibile segreto hardcoded rilevato in $X."
    severity: ERROR
    languages: [python]

  - id: pynt-any-eval
    pattern: eval(...)
    message: "L'uso di eval() è proibito."
    severity: ERROR
    languages: [python]