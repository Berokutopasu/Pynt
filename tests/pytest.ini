[pytest]
# Pytest configuration for Pynt diagnostic validation suite

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    deterministic: Hard checks on ground truth (always run)
    generative: Soft checks on LLM output (requires live server)
    regression: Baseline comparison tests
    governance: Ground truth review & adjudication checks
    slow: Creates baseline/persistent state
    integration: Requires live pynt server

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Coverage
[coverage:run]
source = pynt
omit = 
    */tests/*
    */site-packages/*

[coverage:report]
precision = 2
skip_covered = False
exclude_lines =
    pragma: no cover
    def __repr__
    if __name__ == .__main__.:
